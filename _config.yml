###########################################################
### Tarot Cathedral - Beautiful Jekyll Configuration
###########################################################

site-css:
  - "/assets/css/custom-styles.css"

############################
# --- Required options --- #
############################
title: Tarot Cathedral
author: Tarot Cathedral

###############################################
# --- Navigation bar links --- #
###############################################
navbar-links:
  Home: "/"
  Card meanings: 
    - Major Arcana: "major-arcana"
    - Wands: "wands"
    - Swords: "swords"
    - Coins: "coins"
    - Chalices: "chalices"
  Tags: "tags"
  My art: "my art"
  About: "about"

################
# --- Logo --- #
################
avatar: "/assets/img/avatar-icon.png"
round-avatar: true

# Jeśli chcesz mieć logo zamiast tekstu "Tarot Cathedral" w nawigacji:
# title-img: "/assets/img/logo.png"

#####################################
# --- Footer social media links --- #
#####################################
social-network-links:
  rss: true
  # facebook: twoj_facebook
  # youtube: twoj_kanal
  threads: tarotcathedral
  bluesky: tarotcathedral

###########################
# --- General options --- #
###########################
share-links-active:
  twitter: false
  facebook: true
  linkedin: false
  reddit: false

url-pretty: "tarotcathedral.com"
title-on-all-pages: true
excerpt_length: 90
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: true
navbar-var-length: true

# Keywords for SEO
keywords: "tarot de marseille, tarot meanings, historical tarot, tarot numerology, tarot research, viscoti sforza tarot"

######################################
# --- Colours (tarotowy klimat) --- #
######################################
page-col: "#FAF6F0"           # jasne tło w stylu starego pergaminu
text-col: "#2C2C2C"
link-col: "#8B3A1E"           # głęboki, tarotowy brąz-czerwień
hover-col: "#A0522D"
navbar-col: "#3C2F2F"         # ciemny brąz
navbar-text-col: "#F5EDE4"
navbar-border-col: "#5C4A3F"
footer-col: "#3C2F2F"
footer-text-col: "#C9B9A9"
footer-link-col: "#E8D5B8"
footer-hover-col: "#D4A017"   # złoty akcent

# mobile-theme-col: "#3C2F2F"

#################################
# --- Web Analytics --- #
#################################
# gtag: "G-XXXXXXXXXX"        # dodaj później, jeśli chcesz Google Analytics

####################
# --- Comments --- #
####################
# Na razie zostaw puste. Możemy dodać później (np. giscus lub utterances)

################
# --- Misc --- #
################
date_format: "%B %d, %Y"
